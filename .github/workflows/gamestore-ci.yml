name: GameStore CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1 : Tests unitaires ──────────────────────────────────────────────
  unit-tests:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install flask pytest pytest-cov pytest-html

      - name: Lancer les tests unitaires
        run: |
          pytest tests/test_unit.py -v \
            --cov=app_gamestore \
            --cov-report=html:reports/coverage \
            --html=reports/unit_report.html \
            --self-contained-html

      - name: Uploader les rapports
        uses: actions/upload-artifact@v4
        with:
          name: unit-reports
          path: |
            reports/coverage/
            reports/unit_report.html


  # ── JOB 2 : Tests Newman ────────────────────────────────────────────────
  newman-tests:
    name: Tests API Newman
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Newman
        run: |
          npm install -g newman newman-reporter-htmlextra

      - name: Démarrer l'API GameStore
        run: |
          pip install flask
          python app_gamestore.py &
          sleep 2
          curl http://localhost:5000/health

      - name: Lancer la collection Newman
        run: |
          newman run tests/collection_gamestore_j5.json \
            --env-var "base_url=http://localhost:5000" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/newman_report.html

      - name: Uploader le rapport Newman
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: |
            reports/newman_report.html


  # ── JOB 3 : Tests UI Playwright ─────────────────────────────────────────
  playwright-tests:
    name: Tests UI Playwright
    runs-on: ubuntu-latest
    needs: [unit-tests, newman-tests]

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer Playwright
        run: |
          pip install flask playwright pytest-playwright
          playwright install chromium --with-deps

      - name: Démarrer l'API GameStore
        run: |
          pip install flask
          python app_gamestore.py &
          sleep 2
          curl http://localhost:5000/health

      - name: Lancer les tests UI
        run: |
          pytest tests/test_playwright_j5.py -v \
            --html=reports/playwright_report.html \
            --self-contained-html

      - name: Uploader screenshots et rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: |
            reports/playwright_report.html
            screenshots/